
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thunderstudy — My Results</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#080810;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e32;--s4:#252540;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#eeeef8;--muted:#6b6b90;--muted2:#9898b8;
  --accent:#7c5ce0;--accent2:#00d4ff;
  --green:#00e676;--red:#ff4466;--yellow:#ffd700;--orange:#ff8c42;--pink:#ff6eb4;
  --font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:14px;--r2:20px;--shadow:0 8px 32px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;line-height:1.5;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,92,224,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,224,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
.orb1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(124,92,224,0.12) 0%,transparent 70%);}
.orb2{width:500px;height:500px;bottom:-150px;right:-150px;background:radial-gradient(circle,rgba(0,212,255,0.09) 0%,transparent 70%);}
.page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:0 20px 80px;}
/* HEADER */
.header{padding:32px 0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.logo{font-size:clamp(18px,3vw,28px);font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,#a78bfa,#00d4ff,#00e676);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo span{font-weight:300;}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
/* SUBJECT TABS */
.subject-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;}
.stab{padding:8px 16px;border-radius:30px;font-size:13px;font-weight:700;border:1.5px solid var(--border2);background:var(--s2);color:var(--muted2);cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;}
.stab:hover{border-color:var(--accent);color:var(--text);}
.stab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(124,92,224,.4);}
.stab .rx{display:none;width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.25);align-items:center;justify-content:center;font-size:9px;cursor:pointer;margin-left:2px;}
.stab:hover .rx{display:flex;}
.stab-add{padding:8px 16px;border-radius:30px;font-size:13px;font-weight:600;border:1.5px dashed var(--border2);background:transparent;color:var(--muted);cursor:pointer;transition:.2s;font-family:var(--font);}
.stab-add:hover{border-color:var(--accent);color:var(--accent);}
/* SECTION TITLES */
.sec{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted2);margin:28px 0 12px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}
/* HERO CARD */
.hero{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r2);padding:24px 28px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden;margin-bottom:16px;}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,92,224,.07) 0%,rgba(0,212,255,.04) 100%);pointer-events:none;}
.rank-em{width:84px;height:84px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;border:3px solid;}
.rank-em .ri{font-size:32px;}
.rank-em .rl{font-size:9px;font-weight:800;letter-spacing:1px;margin-top:-2px;}
.hero-info{flex:1;min-width:160px;}
.hero-name{font-size:20px;font-weight:800;margin-bottom:3px;}
.hero-sub{font-size:12px;color:var(--muted2);margin-bottom:10px;}
.hero-badges{display:flex;flex-wrap:wrap;gap:5px;}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;background:var(--s3);border:1px solid var(--border2);color:var(--muted2);}
.bdg.on{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,140,66,.08));border-color:rgba(255,215,0,.4);color:#ffd700;}
.hero-stats{display:flex;gap:18px;flex-wrap:wrap;}
.hs .hv{font-size:24px;font-weight:900;font-family:var(--mono);}
.hs .hl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.streak{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,rgba(255,140,66,.14),rgba(255,68,102,.08));border:1px solid rgba(255,140,66,.3);border-radius:30px;padding:7px 16px;font-size:12px;font-weight:700;color:var(--orange);margin-left:auto;}
/* SUMMARY */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:6px;}
.sc{background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;transition:.2s;}
.sc:hover{transform:translateY(-2px);border-color:var(--border2);}
.sc-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:5px;}
.sc-v{font-size:22px;font-weight:900;font-family:var(--mono);}
.cp{color:#a78bfa;}.cc{color:var(--accent2);}.cg{color:var(--green);}
.cr{color:var(--red);}.cy{color:var(--yellow);}.co{color:var(--orange);}.cm{color:var(--muted2);}
/* CHARTS */
.chart-row{display:grid;grid-template-columns:1fr 1fr 260px;gap:14px;margin-bottom:6px;}
@media(max-width:860px){.chart-row{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.chart-row{grid-template-columns:1fr;}}
.cc2{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;display:flex;flex-direction:column;}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:14px;}
.cw{flex:1;position:relative;min-height:150px;}
.dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.dcb{font-size:26px;font-weight:900;font-family:var(--mono);}
.dcs{font-size:10px;color:var(--muted);}
/* BW */
.bwr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px;}
@media(max-width:520px){.bwr{grid-template-columns:1fr;}}
.bw{border-radius:var(--r2);padding:18px 20px;position:relative;overflow:hidden;}
.bw::after{content:'';position:absolute;top:-25px;right:-25px;width:80px;height:80px;border-radius:50%;opacity:.15;}
.bw-b{background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,230,118,.03));border:1px solid rgba(0,230,118,.22);}
.bw-b::after{background:var(--green);}
.bw-w{background:linear-gradient(135deg,rgba(255,68,102,.1),rgba(255,68,102,.03));border:1px solid rgba(255,68,102,.22);}
.bw-w::after{background:var(--red);}
.bw-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.bw-b .bw-lbl{color:var(--green);} .bw-w .bw-lbl{color:var(--red);}
.bw-ch{font-size:14px;font-weight:700;margin-bottom:3px;}
.bw-sc{font-size:30px;font-weight:900;font-family:var(--mono);}
.bw-dt{font-size:11px;color:var(--muted2);margin-top:3px;}
/* PROGRESS */
.pr{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.pr-lbl{width:190px;flex-shrink:0;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-track{flex:1;height:7px;background:var(--s3);border-radius:8px;overflow:hidden;}
.pr-fill{height:100%;border-radius:8px;transition:width 1.3s cubic-bezier(.34,1.56,.64,1);}
.pr-pct{width:42px;text-align:right;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.pr-time{width:44px;text-align:right;font-size:10px;color:var(--muted);flex-shrink:0;}
/* CHAPTER CARDS */
.cg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.chc{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;}
.chc:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--border2);}
.acc{height:3px;}
.ag{background:linear-gradient(90deg,var(--green),#4ade80);}
.ab{background:linear-gradient(90deg,var(--accent2),#38bdf8);}
.ay{background:linear-gradient(90deg,var(--yellow),#fcd34d);}
.ar{background:linear-gradient(90deg,var(--red),#f87171);}
.cb{padding:16px 18px;}
.ct2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.cn{font-size:13px;font-weight:700;line-height:1.4;}
.ci{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:2px;}
.tb{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--s3);color:var(--muted2);border:1px solid var(--border);white-space:nowrap;}
.gb{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;white-space:nowrap;margin-bottom:4px;}
.gA{background:rgba(0,230,118,.12);color:var(--green);}
.gB{background:rgba(0,212,255,.12);color:var(--accent2);}
.gC{background:rgba(255,215,0,.12);color:var(--yellow);}
.gD{background:rgba(255,68,102,.12);color:var(--red);}
.rw{width:58px;height:58px;flex-shrink:0;position:relative;}
.rw svg{width:58px;height:58px;transform:rotate(-90deg);}
.rb{fill:none;stroke:rgba(255,255,255,.06);stroke-width:5;}
.rf{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1);}
.rp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:var(--mono);}
.sr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.sb{font-size:20px;font-weight:900;font-family:var(--mono);}
.ss{font-size:11px;color:var(--muted2);margin-top:2px;}
.ms{display:flex;gap:6px;margin-bottom:10px;}
.ms div{flex:1;background:var(--s3);border-radius:7px;padding:6px 8px;}
.ms .ml{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.ms .mv{font-size:13px;font-weight:800;font-family:var(--mono);margin-top:2px;}
.imp{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:8px;}
.iup{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.idn{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.2);}
.ism{background:rgba(255,215,0,.08);color:var(--yellow);border:1px solid rgba(255,215,0,.15);}
.htog{font-size:10px;color:var(--muted2);cursor:pointer;display:flex;align-items:center;gap:3px;margin-bottom:6px;user-select:none;}
.htog:hover{color:var(--text);}
.hrows{display:none;}
.hrows.open{display:block;}
.hr2{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;border-radius:7px;background:var(--s3);margin-bottom:3px;font-size:11px;}
.hr2:first-child{border:1px solid rgba(124,92,224,.3);}
.cf{display:flex;justify-content:space-between;align-items:center;padding:9px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);}
.cfb{font-size:10px;font-weight:700;padding:3px 11px;border-radius:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;cursor:pointer;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.cfb:hover{filter:brightness(1.15);}
/* NOT ATTEMPTED */
.nag{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;}
.nac{background:var(--s2);border:1.5px dashed rgba(255,255,255,.09);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:.2s;}
.nac:hover{background:var(--s3);border-color:rgba(124,92,224,.35);}
.ni{width:34px;height:34px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.nn{font-size:12px;font-weight:600;color:var(--text);}
.ns{font-size:9px;font-family:var(--mono);color:var(--muted);margin-top:1px;}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:9000;justify-content:center;align-items:center;padding:16px;backdrop-filter:blur(5px);}
.mov.open{display:flex;}
.mb{background:var(--s1);border:1px solid var(--border2);border-radius:var(--r2);padding:24px;max-width:480px;width:100%;animation:mIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mIn{from{opacity:0;transform:scale(.9) translateY(16px);}to{opacity:1;transform:none;}}
.mt{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;justify-content:space-between;}
.mx{cursor:pointer;color:var(--muted);font-size:20px;line-height:1;} .mx:hover{color:var(--text);}
/* SUBJ OPT */
.so{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:10px;background:var(--s3);border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:.2s;}
.so:hover{border-color:var(--accent);background:var(--s4);}
.so.added{opacity:.4;cursor:not-allowed;}
.sol{display:flex;align-items:center;gap:10px;}
.son{font-size:13px;font-weight:700;}
.sot{font-size:10px;color:var(--muted);font-family:var(--mono);}
/* SHARE CARD (off-screen) */
#scard{width:400px;background:linear-gradient(135deg,#0f0f1a 0%,#161625 40%,#1a1230 100%);border-radius:20px;padding:26px;font-family:var(--font);position:fixed;left:-9999px;top:0;z-index:-1;}
.sch{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.scl{font-size:14px;font-weight:900;background:linear-gradient(135deg,#a78bfa,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.scn{font-size:20px;font-weight:800;color:#eeeef8;margin-bottom:3px;}
.scs{font-size:11px;color:#6b6b90;margin-bottom:14px;}
.scr{display:inline-flex;align-items:center;gap:7px;padding:5px 14px;border-radius:30px;font-size:12px;font-weight:800;margin-bottom:16px;}
.scst{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.scsv{background:rgba(255,255,255,.05);border-radius:8px;padding:8px 10px;text-align:center;}
.scsvv{font-size:18px;font-weight:900;font-family:'JetBrains Mono',monospace;}
.scsvl{font-size:8px;color:#6b6b90;text-transform:uppercase;letter-spacing:.5px;}
.scbr{margin-bottom:5px;}
.scbl{display:flex;justify-content:space-between;font-size:10px;color:#9898b8;margin-bottom:3px;}
.scbt{height:5px;background:rgba(255,255,255,.07);border-radius:5px;overflow:hidden;}
.scbf{height:100%;border-radius:5px;}
.scf{margin-top:14px;text-align:center;font-size:9px;color:#6b6b90;}
/* BTNS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:30px;font-size:12px;font-weight:700;border:none;cursor:pointer;text-decoration:none;transition:transform .18s,filter .18s;font-family:var(--font);}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn:active{transform:scale(.96);}
.btn-sm{padding:6px 13px;font-size:11px;}
.bp{background:linear-gradient(135deg,#7c5ce0,#5b3fc8);color:#fff;box-shadow:0 4px 14px rgba(124,92,224,.3);}
.bc{background:linear-gradient(135deg,#00d4ff,#0099cc);color:#000;}
.bg2{background:linear-gradient(135deg,var(--green),#00b860);color:#000;}
.bo{background:linear-gradient(135deg,var(--orange),#ff5500);color:#fff;}
.bd{background:linear-gradient(135deg,var(--red),#cc0033);color:#fff;}
.bgh{background:var(--s3);color:var(--muted2);border:1px solid var(--border);}
.bgh:hover{color:var(--text);}
.bt{background:linear-gradient(135deg,#0088cc,#005f99);color:#fff;}
.brow{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:20px;}
/* EMPTY */
.empty{text-align:center;padding:70px 20px;}
.ei{font-size:56px;margin-bottom:14px;}
.et{font-size:20px;font-weight:800;margin-bottom:7px;}
.es{font-size:13px;color:var(--muted2);line-height:1.8;}
/* ANIM */
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
.a{animation:fu .42s ease both;}
@media(max-width:680px){
  .hero{padding:18px 16px;} .hero-stats{gap:12px;} .hs .hv{font-size:20px;}
  .bw-sc{font-size:22px;} .pr-lbl{width:110px;} .pr-time{display:none;}
  #scard{width:320px;}
}
</style>
</head>
<body>
<div class="orb orb1"></div><div class="orb orb2"></div>
<div class="page">

<!-- HEADER -->
<div class="header a">
  <div>
    <div class="logo">⚡ Thunder<span>study</span></div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px;" id="hdr-sub">Results Dashboard</div>
  </div>
  <div class="header-right">
    <a href="https://t.me/thunderstudy_official" target="_blank" class="btn bt btn-sm">⚡ Telegram</a>
    <button class="btn bo btn-sm" onclick="openShareModal()">📤 Share</button>
    <button class="btn bg2 btn-sm" onclick="downloadAllPDF()">📄 PDF</button>
    <button class="btn bd btn-sm" onclick="clearSubjectData()">🗑️</button>
  </div>
</div>

<!-- SUBJECT TABS -->
<div id="stabs" class="a" style="animation-delay:.05s"></div>

<!-- MAIN -->
<div id="mc"></div>
</div>

<!-- SHARE MODAL -->
<div class="mov" id="smod">
  <div class="mb">
    <div class="mt"><span>📤 Share Result Card</span><span class="mx" onclick="cm('smod')">×</span></div>
    <div id="sprev" style="background:var(--s3);border-radius:10px;overflow:hidden;min-height:80px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;"><span style="color:var(--muted);font-size:12px;">Generating…</span></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn bc" onclick="dlCard()">⬇️ Download Image</button>
      <button class="btn bgh" onclick="cm('smod')">Cancel</button>
    </div>
  </div>
</div>

<!-- ADD SUBJECT MODAL -->
<div class="mov" id="asmod">
  <div class="mb">
    <div class="mt"><span>➕ Add Subject</span><span class="mx" onclick="cm('asmod')">×</span></div>
    <div id="asl"></div>
  </div>
</div>

<!-- Share card (off-screen) -->
<div id="scard"></div>

<script>
/* ══════════════════════════════════════════════
   MASTER CONFIG — Edit subjects & chapters here
══════════════════════════════════════════════ */
/* ══════════════════════════════════════════════
   URL PATTERNS PER SUBJECT
   baseUrl = folder where all chapter HTML files live
   resultUrl = where result.html lives for that subject
   Format: baseUrl + chapterId + ".html"
══════════════════════════════════════════════ */
const SUBJECT_URLS = {
  bst: "https://commercesehoga.github.io/commerce/bst/",
  eco: "https://commercesehoga.github.io/commerce/eco/",
  acc: "https://commercesehoga.github.io/commerce/acc/",
  eng: "https://commercesehoga.github.io/english/",
  gat: "https://commercesehoga.github.io/gat/",
};

/* Result page URL — update if you host result.html elsewhere */
const RESULT_URL = "https://commercesehoga.github.io/commerce/bst/result.html";

/* Helper — builds full URL for any chapter */
function buildUrl(subjId, chId){
  const base = SUBJECT_URLS[subjId] || `https://commercesehoga.github.io/commerce/${subjId}/`;
  return base + chId + ".html";
}

const SUBJECTS_MASTER = [
  {
    id:"bst", name:"Business Studies", icon:"📊", color:"#7c5ce0",
    /* URL: https://commercesehoga.github.io/commerce/bst/bst1.html */

/* STATE */
let AS=null, CI={};

function getSS(){try{return JSON.parse(localStorage.getItem('ts_subs')||'["bst"]');}catch(e){return["bst"];}}
function saveSS(a){localStorage.setItem('ts_subs',JSON.stringify(a));}

/* STORAGE */
function rKey(s,c){return`thunderstudy_result_${s}_${c}`;}
function hKey(s,c){return`thunderstudy_history_${s}_${c}`;}
function lR(s,c){try{return JSON.parse(localStorage.getItem(rKey(s,c)));}catch(e){return null;}}
function lH(s,c){try{return JSON.parse(localStorage.getItem(hKey(s,c))||'[]');}catch(e){return[];}}

function syncHistory(){
  const subj=SUBJECTS_MASTER.find(s=>s.id===AS);if(!subj)return;
  subj.chapters.forEach(ch=>{
    const r=lR(subj.id,ch.id);if(!r)return;
    let h=lH(subj.id,ch.id);
    if(!h.find(x=>x.date===r.date)){
      h.unshift({date:r.date,score:r.score,maxScore:r.maxScore,percentage:r.percentage});
      if(h.length>10)h=h.slice(0,10);
      localStorage.setItem(hKey(subj.id,ch.id),JSON.stringify(h));
    }
  });
}

/* RANK */
function gRank(p){
  if(p>=85)return{name:'Thunder',icon:'⚡',color:'#ffd700',border:'#ffd700',bg:'rgba(255,215,0,.1)'};
  if(p>=70)return{name:'Gold',icon:'🥇',color:'#ffd700',border:'#ffd700',bg:'rgba(255,215,0,.1)'};
  if(p>=55)return{name:'Silver',icon:'🥈',color:'#c0c0c0',border:'#c0c0c0',bg:'rgba(192,192,192,.1)'};
  if(p>=40)return{name:'Bronze',icon:'🥉',color:'#cd7f32',border:'#cd7f32',bg:'rgba(205,127,50,.1)'};
  return{name:'Rookie',icon:'📚',color:'#7b7b9a',border:'#7b7b9a',bg:'rgba(123,123,154,.1)'};
}

/* GRADE */
function gGrade(p){
  if(p>=75)return{g:'A',cls:'gA',acc:'ag'};
  if(p>=50)return{g:'B',cls:'gB',acc:'ab'};
  if(p>=35)return{g:'C',cls:'gC',acc:'ay'};
  return{g:'D',cls:'gD',acc:'ar'};
}
function rClr(p){return p>=75?'var(--green)':p>=50?'var(--accent2)':p>=35?'var(--yellow)':'var(--red)';}

/* BADGES */
function gBadges(attempted,subj){
  const b=[];
  if(attempted.length>=1)b.push({id:'first',icon:'🎯',name:'First Step',on:true});
  if(attempted.length>=subj.chapters.length)b.push({id:'all',icon:'🏁',name:'All Done!',on:true});
  if(attempted.some(d=>d.percentage>=100))b.push({id:'perfect',icon:'💯',name:'Perfect Score',on:true});
  if(attempted.some(d=>d.timeTaken&&d.timeTaken<900))b.push({id:'speed',icon:'⚡',name:'Speed Demon',on:true});
  const st=gStreak(subj);
  if(st>=3)b.push({id:'streak',icon:'🔥',name:`${st} Streak`,on:true});
  if(attempted.some(d=>d.percentage>=80))b.push({id:'ace',icon:'🌟',name:'Ace',on:true});
  if(!b.find(x=>x.id==='perfect'))b.push({id:'perfect',icon:'💯',name:'Perfect Score',on:false});
  if(!b.find(x=>x.id==='all'))b.push({id:'all',icon:'🏁',name:'All Done!',on:false});
  if(!b.find(x=>x.id==='speed'))b.push({id:'speed',icon:'⚡',name:'Speed Demon',on:false});
  return b;
}
function gStreak(subj){
  let s=0;
  for(let i=0;i<subj.chapters.length;i++){
    if(lR(subj.id,subj.chapters[i].id))s++;else break;
  }
  return s;
}

function fd(iso){try{return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return'—';}}
function ft(s){if(!s&&s!==0)return'—';return`${Math.floor(s/60)}m ${s%60}s`;}

/* TABS */
function renderTabs(){
  const sv=getSS();
  let h='<div class="subject-tabs">';
  sv.forEach(id=>{
    const s=SUBJECTS_MASTER.find(x=>x.id===id);if(!s)return;
    h+=`<div class="stab${id===AS?' active':''}" onclick="sw('${id}')">${s.icon} ${s.name}<span class="rx" onclick="event.stopPropagation();rm('${id}')">✕</span></div>`;
  });
  h+=`<button class="stab-add" onclick="openAddSubj()">+ Add Subject</button></div>`;
  document.getElementById('stabs').innerHTML=h;
}

function sw(id){AS=id;renderTabs();renderMain();}

function rm(id){
  if(!confirm(`Remove ${id.toUpperCase()} from dashboard? (results kept)`))return;
  let sv=getSS().filter(x=>x!==id);saveSS(sv);
  if(AS===id)AS=sv[0]||null;
  renderTabs();renderMain();
}

function openAddSubj(){
  const sv=getSS();
  document.getElementById('asl').innerHTML=SUBJECTS_MASTER.map(s=>{
    const added=sv.includes(s.id);
    return`<div class="so${added?' added':''}" onclick="${added?'':'addS(\''+s.id+'\')'}">
      <div class="sol"><div style="font-size:20px">${s.icon}</div><div><div class="son">${s.name}</div><div class="sot">${s.id.toUpperCase()}</div></div></div>
      ${added?'<span style="font-size:10px;color:var(--muted)">Added ✓</span>':'<span style="font-size:11px;color:var(--accent)">+ Add</span>'}
    </div>`;
  }).join('');
  om('asmod');
}

function addS(id){
  const sv=getSS();if(!sv.includes(id)){sv.push(id);saveSS(sv);}
  cm('asmod');if(!AS)AS=id;
  renderTabs();renderMain();
}

  }
  const subj=SUBJECTS_MASTER.find(s=>s.id===AS);if(!subj)return;

  const att=[];

  }

  const tS=att.reduce((s,d)=>s+d.score,0);
  const tM=att.reduce((s,d)=>s+d.maxScore,0);
  const tC=att.reduce((s,d)=>s+d.correct,0);
  const tW=att.reduce((s,d)=>s+d.incorrect,0);
  const tU=att.reduce((s,d)=>s+d.unanswered,0);
  const op=tM>0?tS/tM*100:0;
  const oa=tC+tW>0?tC/(tC+tW)*100:0;
  const st=gStreak(subj);
  const rank=gRank(op);
  const bgs=gBadges(att,subj);
  const uname=att[0].userName||'Student';
  const bySc=[...att].sort((a,b)=>b.percentage-a.percentage);
  const best=bySc[0],worst=bySc[bySc.length-1];
  const wtm=att.filter(d=>d.timeTaken>0);

  document.getElementById('hdr-sub').textContent=`${uname} · ${subj.name} · ${att.length}/${subj.chapters.length} done`;

  let H='';

  /* HERO */
  H+=`<div class="hero a" style="animation-delay:.07s">
    <div class="rank-em" style="background:${rank.bg};border-color:${rank.border};color:${rank.color};">
      <span class="ri">${rank.icon}</span><span class="rl">${rank.name}</span>

  </div>`;

  /* SUMMARY */
  H+=`<div class="sgrid a" style="animation-delay:.1s">
    <div class="sc"><div class="sc-l">Chapters</div><div class="sc-v cp">${att.length}/${subj.chapters.length}</div></div>

  /* BEST / WORST */
  H+=`<div class="sec a" style="animation-delay:.12s">🏆 Best & Worst</div>

            <span class="gb ${gi.cls}">${gi.g} Grade</span>
            <span class="tb" style="background:${TC[ttype]};color:${TX[ttype]};border-color:${TX[ttype]}33">${TL[ttype]||ttype}</span>
          </div>
        </div>
        <div class="sr">
          <div class="rw">
            <svg viewBox="0 0 60 60"><circle class="rb" cx="30" cy="30" r="25"/>
            <circle class="rf" cx="30" cy="30" r="25" stroke="${clr}" stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${dash.toFixed(2)}"/></svg>
            <div class="rp" style="color:${clr}">${Math.round(p)}%</div>
          </div>
          <div><div class="sb" style="color:${clr}">${d.score}<span style="font-size:13px;color:var(--muted)">/${d.maxScore}</span></div>
          <div class="ss">Acc: ${d.accuracy||0}% · ${ft(d.timeTaken)}</div></div>
        </div>
        <div class="ms">
          <div><div class="ml">Correct</div><div class="mv cg">${d.correct}</div></div>
          <div><div class="ml">Wrong</div><div class="mv cr">${d.incorrect}</div></div>
          <div><div class="ml">Skipped</div><div class="mv cc">${d.unanswered}</div></div>
          <div><div class="ml">Total</div><div class="mv cm">${d.totalQ||50}</div></div>
        </div>
        ${impH}${histH}
      </div>
      <div class="cf"><span>📅 ${fd(d.date)}</span><a class="cfb" href="${chUrl}" target="_blank">↻ Retake</a></div>
    </div>`;
  });
  H+=`</div>`;

  /* NOT ATTEMPTED */
  const na=subj.chapters.filter(ch=>!att.find(a=>a.chapterId===ch.id));
  if(na.length>0){
    H+=`<div class="sec a" style="animation-delay:.28s">📋 Not Attempted (${na.length})</div><div class="nag a" style="animation-delay:.29s">`;
    na.forEach(ch=>{
      const url=buildUrl(subj.id, ch.id);
      H+=`<a class="nac" href="${url}" target="_blank">
        <div class="ni">📝</div>
        <div><div class="nn">${ch.name}</div><div class="ns">${ch.id.toUpperCase()} · ${TL[ch.type]||ch.type} · Go →</div></div>
      </a>`;
    });
    H+=`</div>`;
  }

  mc.innerHTML=H;

  setTimeout(()=>{
    document.querySelectorAll('[data-to]').forEach(el=>{el.style.width=el.dataset.to;});
  },80);
  setTimeout(()=>{
    renderTrend(att);renderTime(wtm);renderDonut(att.length,subj.chapters.length);
  },130);
}

/* CHARTS */
function cOpts(yMax100){return{
  responsive:true,maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{callbacks:{}}},
  scales:{
    x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b6b90',font:{size:9,family:'JetBrains Mono'},maxRotation:45,maxTicksLimit:8}},
    y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b6b90',font:{size:9,family:'JetBrains Mono'}},min:0,...(yMax100?{max:100}:{})}
  }
};}

function renderTrend(att){
  const cv=document.getElementById('ch-trend');if(!cv)return;
  const s=[...att].sort((a,b)=>a.chapterId.localeCompare(b.chapterId));
  const ctx=cv.getContext('2d');
  const g=ctx.createLinearGradient(0,0,0,200);
  g.addColorStop(0,'rgba(124,92,224,0.32)');g.addColorStop(1,'rgba(124,92,224,0)');
  const opts=cOpts(true);
  opts.plugins.tooltip.callbacks.label=c=>`${c.parsed.y.toFixed(1)}%`;
  CI['t']=new Chart(ctx,{type:'line',data:{
    labels:s.map(d=>(d.ci?.name||d.chapterId).substring(0,6)),
    datasets:[{data:s.map(d=>d.percentage||0),fill:true,backgroundColor:g,borderColor:'#a78bfa',
      pointBackgroundColor:'#a78bfa',pointRadius:3,pointHoverRadius:5,borderWidth:2,tension:.35}]
  },options:opts});
}

function renderTime(wtm){
  const cv=document.getElementById('ch-time');if(!cv||!wtm.length)return;
  const s=[...wtm].sort((a,b)=>a.chapterId.localeCompare(b.chapterId));
  const opts=cOpts(false);
  opts.plugins.tooltip.callbacks.label=c=>`${c.parsed.y} min`;
  opts.scales.y.ticks.callback=v=>v+'m';
  CI['tm']=new Chart(cv.getContext('2d'),{type:'bar',data:{
    labels:s.map(d=>(d.ci?.name||d.chapterId).substring(0,6)),
    datasets:[{data:s.map(d=>Math.round(d.timeTaken/60)),
      backgroundColor:'rgba(0,212,255,0.28)',borderColor:'rgba(0,212,255,0.7)',
      borderWidth:1,borderRadius:3}]
  },options:opts});
}

function renderDonut(done,total){
  const cv=document.getElementById('ch-donut');if(!cv)return;
  CI['d']=new Chart(cv.getContext('2d'),{type:'doughnut',data:{
    datasets:[{data:[done,total-done],
      backgroundColor:['rgba(0,212,255,0.8)','rgba(255,255,255,0.05)'],
      borderColor:['rgba(0,212,255,1)','transparent'],borderWidth:[2,0],hoverOffset:3}]
  },options:{responsive:true,maintainAspectRatio:true,cutout:'72%',plugins:{legend:{display:false},
    tooltip:{callbacks:{label:c=>c.dataIndex===0?`Done: ${done}`:`Left: ${total-done}`}}}}});
}

/* HISTORY TOGGLE */
function thist(el){
  const r=el.nextElementSibling;r.classList.toggle('open');
  el.textContent=r.classList.contains('open')?el.textContent.replace('▾','▴'):el.textContent.replace('▴','▾');
}

/* SHARE CARD */
function buildSC(){
  const subj=SUBJECTS_MASTER.find(s=>s.id===AS);if(!subj)return;
  const att=[];subj.chapters.forEach(ch=>{const r=lR(subj.id,ch.id);if(r)att.push({...r,ci:ch});});
  if(!att.length)return;
  const tS=att.reduce((s,d)=>s+d.score,0),tM=att.reduce((s,d)=>s+d.maxScore,0);
  const tC=att.reduce((s,d)=>s+d.correct,0),tW=att.reduce((s,d)=>s+d.incorrect,0);
  const p=tM>0?tS/tM*100:0,rank=gRank(p);
  const uname=att[0].userName||'Student';
  const now=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'});
  const top6=[...att].sort((a,b)=>a.chapterId.localeCompare(b.chapterId)).slice(0,6);
  document.getElementById('scard').innerHTML=`
    <div class="sch"><div class="scl">⚡ Thunderstudy</div><div style="font-size:9px;color:#6b6b90;font-family:'JetBrains Mono'">${now}</div></div>
    <div class="scn">${uname}</div>
    <div class="scs">${subj.icon} ${subj.name} · ${att.length}/${subj.chapters.length} chapters</div>
    <div class="scr" style="background:${rank.bg};color:${rank.color};border:1px solid ${rank.border}40">${rank.icon} ${rank.name} · ${p.toFixed(1)}%</div>
    <div class="scst">
      <div class="scsv"><div class="scsvv" style="color:#ffd700">${p.toFixed(1)}%</div><div class="scsvl">Overall</div></div>
      <div class="scsv"><div class="scsvv" style="color:#00e676">${tC}</div><div class="scsvl">Correct</div></div>
      <div class="scsv"><div class="scsvv" style="color:#ff4466">${tW}</div><div class="scsvl">Wrong</div></div>
    </div>
    ${top6.map(d=>{const pp=d.percentage||0,clr=pp>=75?'#00e676':pp>=50?'#00d4ff':pp>=35?'#ffd700':'#ff4466';
      return`<div class="scbr"><div class="scbl"><span>${(d.ci?.name||d.chapterId).substring(0,26)}</span><span style="color:${clr}">${pp.toFixed(1)}%</span></div>
      <div class="scbt"><div class="scbf" style="width:${pp}%;background:${clr}"></div></div></div>`;}).join('')}
    <div class="scf">t.me/thunderstudy_official · Score: ${tS}/${tM}</div>`;
}

function openShareModal(){
  buildSC();
  const pv=document.getElementById('sprev');
  pv.innerHTML='<span style="color:var(--muted);font-size:12px;padding:20px;display:block;">Generating…</span>';
  om('smod');
  setTimeout(()=>{
    html2canvas(document.getElementById('scard'),{backgroundColor:'#0f0f1a',scale:2,useCORS:true,logging:false})
    .then(cv=>{cv.style.cssText='width:100%;height:auto;border-radius:10px;display:block;';pv.innerHTML='';pv.appendChild(cv);})
    .catch(()=>{pv.innerHTML='<span style="color:var(--muted);font-size:12px;padding:16px;display:block;">Preview unavailable — download directly</span>';});
  },200);
}

function dlCard(){

/* CLEAR */
function clearSubjectData(){
  const subj=SUBJECTS_MASTER.find(s=>s.id===AS);if(!subj)return;
  if(!confirm(`⚠️ Delete ALL ${subj.name} results?\n\nThis cannot be undone.`))return;
  subj.chapters.forEach(ch=>{localStorage.removeItem(rKey(subj.id,ch.id));localStorage.removeItem(hKey(subj.id,ch.id));});
  localStorage.removeItem(`thunderstudy_index_${subj.id}`);
  renderMain();
}
