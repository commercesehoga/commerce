<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>⚡ Thunderstudy — Results</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ═══ THEME ═══ */
:root{
  --bg:#080810;--s1:#0f0f1a;--s2:#161625;--s3:#1e1e32;--s4:#252540;
  --border:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --text:#eeeef8;--muted:#6b6b90;--muted2:#9898b8;
  --acc:#7c5ce0;--acc2:#00d4ff;
  --green:#00e676;--red:#ff4466;--yellow:#ffd700;--orange:#ff8c42;--pink:#ff6eb4;
  --fn:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:14px;--r2:20px;--sh:0 8px 32px rgba(0,0,0,.6);
  --nav-h:60px;
}
[data-theme="light"]{
  --bg:#f0f2f8;--s1:#ffffff;--s2:#ffffff;--s3:#f0f2f8;--s4:#e4e7f0;
  --border:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.15);
  --text:#1a1a2e;--muted:#8888aa;--muted2:#6666aa;
  --sh:0 4px 20px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--fn);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s;}
[data-theme="dark"] body::before{content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(124,92,224,.03)1px,transparent 1px),linear-gradient(90deg,rgba(124,92,224,.03)1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;z-index:0;}
[data-theme="dark"] .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;}
[data-theme="dark"] .orb1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(124,92,224,.1)0%,transparent 70%);}
[data-theme="dark"] .orb2{width:500px;height:500px;bottom:-150px;right:-150px;background:radial-gradient(circle,rgba(0,212,255,.07)0%,transparent 70%);}

/* ═══ NAV ═══ */
.nav{position:sticky;top:0;z-index:500;background:var(--s1);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;height:var(--nav-h);backdrop-filter:blur(12px);}
.nav-logo{padding:0 20px;font-size:18px;font-weight:900;
  background:linear-gradient(135deg,#a78bfa,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  white-space:nowrap;}
.nav-tabs{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;flex:1;}
.nav-tabs::-webkit-scrollbar{display:none;}
.ntab{padding:0 20px;height:var(--nav-h);display:flex;align-items:center;gap:7px;
  font-size:13px;font-weight:700;color:var(--muted2);cursor:pointer;
  border-bottom:3px solid transparent;white-space:nowrap;transition:.2s;border-top:3px solid transparent;}
.ntab:hover{color:var(--text);}
.ntab.active{color:var(--acc);border-bottom-color:var(--acc);}
.nav-right{display:flex;align-items:center;gap:8px;padding:0 16px;margin-left:auto;flex-shrink:0;}

/* ═══ LAYOUT ═══ */
.page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:24px 20px 80px;}

/* ═══ BUTTONS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:30px;
  font-size:12px;font-weight:700;border:none;cursor:pointer;text-decoration:none;
  transition:transform .18s,filter .18s,box-shadow .18s;font-family:var(--fn);}
.btn:hover{transform:translateY(-2px);filter:brightness(1.1);}
.btn:active{transform:scale(.96);}
.bp{background:linear-gradient(135deg,#7c5ce0,#5b3fc8);color:#fff;box-shadow:0 4px 14px rgba(124,92,224,.3);}
.bc{background:linear-gradient(135deg,#00d4ff,#0099cc);color:#000;}
.bg2{background:linear-gradient(135deg,var(--green),#00b860);color:#000;}
.bo{background:linear-gradient(135deg,var(--orange),#e05000);color:#fff;}
.bd{background:linear-gradient(135deg,var(--red),#cc0033);color:#fff;}
.bgh{background:var(--s3);color:var(--muted2);border:1px solid var(--border);}
.bgh:hover{color:var(--text);}
.bt{background:linear-gradient(135deg,#0088cc,#005f99);color:#fff;}
.btn-sm{padding:6px 12px;font-size:11px;}
.btn-xs{padding:4px 10px;font-size:10px;}

/* ═══ SECTION TITLE ═══ */
.sec{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;
  color:var(--muted2);margin:28px 0 14px;display:flex;align-items:center;gap:10px;}
.sec::after{content:'';flex:1;height:1px;background:var(--border);}

/* ═══ MODAL ═══ */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:9000;
  justify-content:center;align-items:center;padding:16px;backdrop-filter:blur(6px);}
.mov.open{display:flex;}
.mb{background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r2);
  padding:24px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;
  animation:mIn .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes mIn{from{opacity:0;transform:scale(.9) translateY(16px);}to{opacity:1;transform:none;}}
.mt{font-size:16px;font-weight:800;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
.mx{cursor:pointer;color:var(--muted);font-size:22px;line-height:1;}.mx:hover{color:var(--text);}

/* ═══ CARDS ═══ */
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:20px;transition:.2s;}
.card:hover{border-color:var(--bdr2);box-shadow:var(--sh);}

/* ═══ PROFILE SECTION ═══ */
.profile-hero{background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r2);
  padding:28px;display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;
  position:relative;overflow:hidden;margin-bottom:20px;}
.profile-hero::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,92,224,.06),rgba(0,212,255,.03));pointer-events:none;}
.avatar-wrap{position:relative;flex-shrink:0;}
.avatar{width:88px;height:88px;border-radius:50%;object-fit:cover;
  border:3px solid var(--acc);background:var(--s3);display:flex;align-items:center;
  justify-content:center;font-size:36px;cursor:pointer;overflow:hidden;}
.avatar img{width:100%;height:100%;object-fit:cover;}
.avatar-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;border-radius:50%;
  background:var(--acc);border:2px solid var(--s2);display:flex;align-items:center;
  justify-content:center;font-size:12px;cursor:pointer;}
.profile-info{flex:1;min-width:200px;}
.profile-name{font-size:24px;font-weight:900;margin-bottom:3px;}
.profile-meta{font-size:12px;color:var(--muted2);display:flex;flex-wrap:wrap;gap:12px;margin-bottom:12px;}
.profile-meta span{display:flex;align-items:center;gap:4px;}
.rank-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 16px;
  border-radius:30px;font-size:13px;font-weight:800;margin-bottom:12px;}
.profile-edit-btn{font-size:11px;color:var(--acc);cursor:pointer;text-decoration:underline;}

/* Goal card inline */
.goal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-top:16px;}
.goal-item{background:var(--s3);border-radius:var(--r);padding:12px 14px;}
.goal-subj{font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:4px;}
.goal-bar-track{height:6px;background:rgba(255,255,255,.08);border-radius:6px;overflow:hidden;margin-bottom:4px;}
.goal-bar-fill{height:100%;border-radius:6px;transition:width 1s ease;}
.goal-nums{display:flex;justify-content:space-between;font-size:10px;font-family:var(--mono);}

/* ═══ HOME STATS GRID ═══ */
.home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.hsc{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;transition:.2s;cursor:default;}
.hsc:hover{transform:translateY(-3px);border-color:var(--bdr2);box-shadow:var(--sh);}
.hsc-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.hsc-v{font-size:26px;font-weight:900;font-family:var(--mono);}

/* ═══ SUBJECT ROW (home) ═══ */
.subj-row{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);
  padding:16px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  margin-bottom:12px;cursor:pointer;transition:.2s;}
.subj-row:hover{border-color:var(--bdr2);transform:translateX(4px);}
.subj-icon{font-size:28px;flex-shrink:0;}
.subj-info{flex:1;min-width:140px;}
.subj-name{font-size:15px;font-weight:800;margin-bottom:2px;}
.subj-meta{font-size:11px;color:var(--muted2);}
.subj-pct{font-size:28px;font-weight:900;font-family:var(--mono);flex-shrink:0;}
.subj-bar-wrap{width:120px;flex-shrink:0;}
.subj-bar-t{height:6px;background:rgba(255,255,255,.07);border-radius:6px;overflow:hidden;}
.subj-bar-f{height:100%;border-radius:6px;transition:width 1.2s ease;}
.go-btn{font-size:10px;font-weight:700;padding:5px 12px;border-radius:20px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;cursor:pointer;flex-shrink:0;}

/* ═══ HEATMAP ═══ */
.heatmap-wrap{overflow-x:auto;padding-bottom:8px;}
.heatmap-grid{display:inline-flex;gap:3px;}
.hm-week{display:flex;flex-direction:column;gap:3px;}
.hm-day{width:13px;height:13px;border-radius:3px;background:rgba(255,255,255,.06);
  cursor:pointer;transition:.15s;position:relative;}
.hm-day:hover{transform:scale(1.4);z-index:10;}
.hm-day.l0{background:rgba(255,255,255,.06);}
.hm-day.l1{background:rgba(124,92,224,.3);}
.hm-day.l2{background:rgba(124,92,224,.55);}
.hm-day.l3{background:rgba(124,92,224,.8);}
.hm-day.l4{background:#7c5ce0;}
.hm-months{display:flex;gap:0;padding-left:18px;margin-bottom:4px;}
.hm-month-lbl{font-size:9px;color:var(--muted);font-family:var(--mono);}
.hm-days-lbl{display:flex;flex-direction:column;gap:3px;margin-right:4px;padding-top:1px;}
.hm-dl{font-size:9px;color:var(--muted);height:13px;display:flex;align-items:center;font-family:var(--mono);}
.hm-tooltip{position:fixed;background:var(--s1);border:1px solid var(--bdr2);
  border-radius:8px;padding:6px 10px;font-size:11px;pointer-events:none;
  z-index:999;display:none;box-shadow:0 4px 14px rgba(0,0,0,.4);}

/* ═══ CHARTS ═══ */
.chart-row{display:grid;grid-template-columns:1fr 1fr 240px;gap:14px;margin-bottom:6px;}
@media(max-width:860px){.chart-row{grid-template-columns:1fr 1fr;}}
@media(max-width:560px){.chart-row{grid-template-columns:1fr;}}
.cc2{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:18px;display:flex;flex-direction:column;}
.ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:14px;}
.cw{flex:1;position:relative;min-height:150px;}
.dc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
.dcb{font-size:26px;font-weight:900;font-family:var(--mono);}
.dcs{font-size:10px;color:var(--muted);}

/* ═══ TARGET SCORE SETTER ═══ */
.target-card{background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--r2);padding:20px;margin-bottom:20px;}
.target-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.target-label{font-size:13px;font-weight:700;min-width:140px;}
.target-slider{flex:1;min-width:100px;accent-color:var(--acc);}
.target-val{font-size:14px;font-weight:900;font-family:var(--mono);color:var(--acc);min-width:44px;}
.target-result{background:var(--s3);border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.8;margin-top:10px;}
.target-result strong{color:var(--acc2);}

/* ═══ PREDICTED SCORE ═══ */
.predict-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;}
.pcard{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;text-align:center;}
.pcard-icon{font-size:28px;margin-bottom:6px;}
.pcard-subj{font-size:11px;color:var(--muted2);margin-bottom:4px;}
.pcard-score{font-size:28px;font-weight:900;font-family:var(--mono);}
.pcard-note{font-size:10px;color:var(--muted);margin-top:4px;}
.predict-total{background:linear-gradient(135deg,rgba(124,92,224,.12),rgba(0,212,255,.08));
  border:1px solid rgba(124,92,224,.3);border-radius:var(--r2);padding:20px 24px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:14px;}
.pt-val{font-size:42px;font-weight:900;font-family:var(--mono);}

/* ═══ CHAPTER CARDS ═══ */
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;align-items:center;}
.filter-inp{background:var(--s3);border:1px solid var(--border);border-radius:30px;
  padding:7px 14px;font-size:12px;color:var(--text);font-family:var(--fn);outline:none;min-width:180px;}
.filter-inp:focus{border-color:var(--acc);}
.filter-sel{background:var(--s3);border:1px solid var(--border);border-radius:30px;
  padding:7px 12px;font-size:12px;color:var(--text);font-family:var(--fn);outline:none;cursor:pointer;}
.filter-sel:focus{border-color:var(--acc);}
.cg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.chc{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);
  overflow:hidden;transition:transform .2s,box-shadow .2s,border-color .2s;}
.chc:hover{transform:translateY(-3px);box-shadow:var(--sh);border-color:var(--bdr2);}
.acc2{height:3px;}
.ag{background:linear-gradient(90deg,var(--green),#4ade80);}
.ab{background:linear-gradient(90deg,var(--acc2),#38bdf8);}
.ay{background:linear-gradient(90deg,var(--yellow),#fcd34d);}
.ar{background:linear-gradient(90deg,var(--red),#f87171);}
.cb2{padding:16px 18px;}
.ct2{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.cn{font-size:13px;font-weight:700;line-height:1.4;}
.ci{font-size:10px;font-family:var(--mono);color:var(--muted);margin-top:2px;}
.tb{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;
  background:var(--s3);color:var(--muted2);border:1px solid var(--border);white-space:nowrap;}
.gb{font-size:10px;font-weight:800;padding:2px 9px;border-radius:20px;white-space:nowrap;margin-bottom:4px;}
.gA{background:rgba(0,230,118,.12);color:var(--green);}
.gB{background:rgba(0,212,255,.12);color:var(--acc2);}
.gC{background:rgba(255,215,0,.12);color:var(--yellow);}
.gD{background:rgba(255,68,102,.12);color:var(--red);}
.rw{width:56px;height:56px;flex-shrink:0;position:relative;}
.rw svg{width:56px;height:56px;transform:rotate(-90deg);}
.rb{fill:none;stroke:rgba(255,255,255,.06);stroke-width:5;}
.rf{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.34,1.56,.64,1);}
.rp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;font-family:var(--mono);}
.sr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.sb{font-size:20px;font-weight:900;font-family:var(--mono);}
.ss{font-size:11px;color:var(--muted2);margin-top:2px;}
.ms{display:flex;gap:6px;margin-bottom:10px;}
.ms div{flex:1;background:var(--s3);border-radius:7px;padding:6px 8px;}
.ms .ml{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}
.ms .mv{font-size:13px;font-weight:800;font-family:var(--mono);margin-top:2px;}
.imp{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;
  padding:2px 9px;border-radius:20px;margin-bottom:8px;}
.iup{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.idn{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.2);}
.ism{background:rgba(255,215,0,.08);color:var(--yellow);border:1px solid rgba(255,215,0,.15);}
.htog{font-size:10px;color:var(--muted2);cursor:pointer;display:flex;align-items:center;gap:3px;margin-bottom:6px;user-select:none;}
.htog:hover{color:var(--text);}
.hrows{display:none;}
.hrows.open{display:block;}
.hr2{display:flex;justify-content:space-between;align-items:center;
  padding:5px 9px;border-radius:7px;background:var(--s3);margin-bottom:3px;font-size:11px;}
.hr2:first-child{border:1px solid rgba(124,92,224,.3);}
.cf{display:flex;justify-content:space-between;align-items:center;
  padding:9px 18px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);}
.cfb{font-size:10px;font-weight:700;padding:3px 11px;border-radius:20px;
  background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;border:none;cursor:pointer;
  transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:3px;}
.cfb:hover{filter:brightness(1.15);}

/* ═══ NOT ATTEMPTED ═══ */
.nag{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;}
.nac{background:var(--s2);border:1.5px dashed rgba(255,255,255,.09);border-radius:var(--r);
  padding:12px 14px;display:flex;align-items:center;gap:10px;text-decoration:none;transition:.2s;}
.nac:hover{background:var(--s3);border-color:rgba(124,92,224,.35);}
.ni{width:32px;height:32px;border-radius:50%;background:var(--s3);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.nn{font-size:12px;font-weight:600;color:var(--text);}
.ns{font-size:9px;font-family:var(--mono);color:var(--muted);margin-top:1px;}

/* ═══ BEST/WORST ═══ */
.bwr{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:6px;}
@media(max-width:520px){.bwr{grid-template-columns:1fr;}}
.bw{border-radius:var(--r2);padding:18px 20px;}
.bw-b{background:linear-gradient(135deg,rgba(0,230,118,.1),rgba(0,230,118,.03));border:1px solid rgba(0,230,118,.22);}
.bw-w{background:linear-gradient(135deg,rgba(255,68,102,.1),rgba(255,68,102,.03));border:1px solid rgba(255,68,102,.22);}
.bw-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;}
.bw-b .bw-lbl{color:var(--green);}.bw-w .bw-lbl{color:var(--red);}
.bw-ch{font-size:14px;font-weight:700;margin-bottom:3px;}
.bw-sc{font-size:30px;font-weight:900;font-family:var(--mono);}
.bw-dt{font-size:11px;color:var(--muted2);margin-top:3px;}

/* ═══ PROGRESS ═══ */
.pr{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.pr-lbl{width:180px;flex-shrink:0;font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-track{flex:1;height:7px;background:var(--s3);border-radius:8px;overflow:hidden;}
.pr-fill{height:100%;border-radius:8px;transition:width 1.3s cubic-bezier(.34,1.56,.64,1);}
.pr-pct{width:40px;text-align:right;font-size:11px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
.pr-time{width:40px;text-align:right;font-size:10px;color:var(--muted);flex-shrink:0;}

/* ═══ SHARE / RANK CARD ═══ */
#scard-wrap{position:fixed;left:-9999px;top:0;z-index:-1;}
#scard{width:420px;font-family:var(--fn);}
.sc-inner{background:linear-gradient(135deg,#0d0d1a 0%,#161630 50%,#0d1a2e 100%);
  border-radius:20px;padding:28px;border:1px solid rgba(124,92,224,.3);}

.step-body{flex:1;}
.step-title{font-size:13px;font-weight:700;margin-bottom:3px;}

code{background:var(--s3);padding:1px 6px;border-radius:4px;font-family:var(--mono);font-size:11px;color:var(--acc2);}

   STORAGE HELPERS
   NOTE: GS URL is now hardcoded above, not stored in localStorage.
   getGsUrl() now returns the hardcoded constant.
══════════════════════════════════════════ */
function rKey(s,c){return`thunderstudy_result_${s}_${c}`;}
function hKey(s,c){return`thunderstudy_history_${s}_${c}`;}
function lR(s,c){try{return JSON.parse(localStorage.getItem(rKey(s,c)));}catch(e){return null;}}
function lH(s,c){try{return JSON.parse(localStorage.getItem(hKey(s,c))||'[]');}catch(e){return[];}}
function getSS(){try{return JSON.parse(localStorage.getItem('ts_subs')||'["bst"]');}catch(e){return["bst"];}}
function saveSS(a){localStorage.setItem('ts_subs',JSON.stringify(a));}

function getGsUrl(){return GS_URL;}

function buildUrl(sId,cId){
  return(SUBJECT_URLS[sId]||`https://commercesehoga.github.io/commerce/${sId}/`)+cId+".html";

/* ══════════════════════════════════════════
   SYNC HISTORY
══════════════════════════════════════════ */
function syncHistory(){
  SUBJECTS_MASTER.forEach(subj=>{
    subj.chapters.forEach(ch=>{
      const r=lR(subj.id,ch.id);if(!r)return;
      let h=lH(subj.id,ch.id);
      if(!h.find(x=>x.date===r.date)){
        h.unshift({date:r.date,score:r.score,maxScore:r.maxScore,percentage:r.percentage,timeTaken:r.timeTaken});
        if(h.length>10)h=h.slice(0,10);
        localStorage.setItem(hKey(subj.id,ch.id),JSON.stringify(h));
      }
    });
  });
}

/* ══════════════════════════════════════════
   RANK / GRADE / HELPERS
══════════════════════════════════════════ */
function gRank(p){
  if(p>=85)return{name:'Thunder',icon:'⚡',color:'#ffd700',border:'#ffd700',bg:'rgba(255,215,0,.1)'};
  if(p>=70)return{name:'Gold',icon:'🥇',color:'#ffd700',border:'#ffd700',bg:'rgba(255,215,0,.1)'};
  if(p>=55)return{name:'Silver',icon:'🥈',color:'#c0c0c0',border:'#c0c0c0',bg:'rgba(192,192,192,.1)'};
  if(p>=40)return{name:'Bronze',icon:'🥉',color:'#cd7f32',border:'#cd7f32',bg:'rgba(205,127,50,.1)'};
  return{name:'Rookie',icon:'📚',color:'#7b7b9a',border:'#7b7b9a',bg:'rgba(123,123,154,.1)'};
}
function gGrade(p){
  if(p>=75)return{g:'A',cls:'gA',acc:'ag'};
  if(p>=50)return{g:'B',cls:'gB',acc:'ab'};
  if(p>=35)return{g:'C',cls:'gC',acc:'ay'};
  return{g:'D',cls:'gD',acc:'ar'};
}
function rClr(p){return p>=75?'var(--green)':p>=50?'var(--acc2)':p>=35?'var(--yellow)':'var(--red)';}
function fd(iso){try{return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}catch(e){return'—';}}
function ft(s){if(!s&&s!==0)return'—';return`${Math.floor(s/60)}m ${s%60}s`;}
function gStreak(subj){let s=0;for(let i=0;i<subj.chapters.length;i++){if(lR(subj.id,subj.chapters[i].id))s++;else break;}return s;}
function gBadges(att,subj){
  const b=[];
  if(att.length>=1)b.push({id:'first',icon:'🎯',name:'First Step',on:true});
  if(att.length>=subj.chapters.length)b.push({id:'all',icon:'🏁',name:'All Done!',on:true});
  if(att.some(d=>d.percentage>=100))b.push({id:'perfect',icon:'💯',name:'Perfect',on:true});
  if(att.some(d=>d.timeTaken&&d.timeTaken<900))b.push({id:'speed',icon:'⚡',name:'Speed Demon',on:true});
  const st=gStreak(subj);
  if(st>=3)b.push({id:'streak',icon:'🔥',name:`${st} Streak`,on:true});
  if(att.some(d=>d.percentage>=80))b.push({id:'ace',icon:'🌟',name:'Ace',on:true});
  if(!b.find(x=>x.id==='perfect'))b.push({id:'perfect',icon:'💯',name:'Perfect',on:false});
  if(!b.find(x=>x.id==='all'))b.push({id:'all',icon:'🏁',name:'All Done!',on:false});
  if(!b.find(x=>x.id==='speed'))b.push({id:'speed',icon:'⚡',name:'Speed Demon',on:false});
  return b;
}

/* ══════════════════════════════════════════
   🔴 LIVE LEADERBOARD — fetch from Google Sheet
   Your Apps Script must also support GET ?action=getAll
   to return JSON of all rows. See note below.
══════════════════════════════════════════ */
async function fetchLeaderboardData(){
  try{
    const res=await fetch(GS_URL+'?action=getAll',{method:'GET'});
    const text=await res.text();
    // Apps Script returns JSON wrapped sometimes, strip any BOM/prefix
    const clean=text.replace(/^\)\]\}'/, '').trim();
    const data=JSON.parse(clean);
    return data;
  }catch(e){
    return null;
  }
}

function renderLeaderboard(container){
  container.innerHTML=`<div class="lb-loading"><span class="lb-loading-spin"></span>Loading class data from Google Sheet…</div>`;
  fetchLeaderboardData().then(data=>{
    if(!data||!Array.isArray(data)||data.length===0){
      container.innerHTML=`<div class="lb-error">⚠️ Could not load data. Make sure your Apps Script supports GET requests (see note in Settings). <button class="lb-refresh" onclick="renderLeaderboard(this.closest('.lb-wrap').querySelector('.lb-body'))">↺ Retry</button></div>`;
      return;
    }
    LB_DATA=data;
    renderLbView(container,'recent');
  });
}

function renderLbView(container, tab){
  if(!LB_DATA){renderLeaderboard(container);return;}
  LB_TAB=tab;
  const data=LB_DATA;

  // Parse rows — sheet columns: Timestamp, Name, Subject, Chapter, Score, MaxScore, Percentage, Correct, Wrong, Skipped, TimeTaken, Accuracy, Date
  const rows=data.map(r=>({
    timestamp:r[0]||'',
    name:r[1]||'Unknown',
    subject:r[2]||'',
    chapter:r[3]||'',
    score:parseFloat(r[4])||0,
    maxScore:parseFloat(r[5])||0,
    percentage:parseFloat(r[6])||0,
    correct:parseInt(r[7])||0,
    wrong:parseInt(r[8])||0,
    skipped:parseInt(r[9])||0,
    timeTaken:parseInt(r[10])||0,
    accuracy:parseFloat(r[11])||0,
    date:r[12]||r[0]||''
  })).filter(r=>r.name&&r.name!=='Name'&&r.name!=='TEST'); // skip header row & test rows

  // Summary stats
  const totalTests=rows.length;
  const uniqueStudents=[...new Set(rows.map(r=>r.name))].length;
  const avgPct=rows.length>0?(rows.reduce((s,r)=>s+r.percentage,0)/rows.length).toFixed(1):0;
  const topPct=rows.length>0?Math.max(...rows.map(r=>r.percentage)).toFixed(1):0;

  let H=`
  <div class="lb-summary-grid">
    <div class="lb-sum-item"><div class="lb-sum-v cp">${totalTests}</div><div class="lb-sum-l">Total Tests</div></div>
    <div class="lb-sum-item"><div class="lb-sum-v cc">${uniqueStudents}</div><div class="lb-sum-l">Students</div></div>
    <div class="lb-sum-item"><div class="lb-sum-v cy">${avgPct}%</div><div class="lb-sum-l">Class Avg</div></div>
    <div class="lb-sum-item"><div class="lb-sum-v cg">${topPct}%</div><div class="lb-sum-l">Top Score</div></div>
  </div>
  <div class="lb-tabs">
    <div class="lb-tab ${tab==='recent'?'active':''}" onclick="switchLbTab('recent')">🕐 Recent</div>
    <div class="lb-tab ${tab==='top'?'active':''}" onclick="switchLbTab('top')">🏆 Top Scores</div>
    <div class="lb-tab ${tab==='students'?'active':''}" onclick="switchLbTab('students')">👥 Students</div>
  </div>`;

  if(tab==='recent'){
    const recent=[...rows].sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).slice(0,20);
    H+=`<div class="lb-row lb-head"><span>#</span><span>Name</span><span>Subject</span><span>Score</span><span>%</span><span>Date</span></div>`;
    recent.forEach((r,i)=>{
      const clr=rClr(r.percentage);
      const medal=i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':'';
      H+=`<div class="lb-row">
        <div class="lb-rank ${medal}">${medal?['🥇','🥈','🥉'][i]:i+1}</div>
        <div class="lb-name">${escH(r.name)}</div>
        <div class="lb-subj">${escH(r.subject.toUpperCase())}</div>
        <div class="lb-score">${r.score}/${r.maxScore}</div>
        <div class="lb-pct" style="color:${clr}">${r.percentage.toFixed(1)}%</div>
        <div class="lb-date">${fdShort(r.date)}</div>
      </div>`;
    });
  } else if(tab==='top'){
    const top=[...rows].sort((a,b)=>b.percentage-a.percentage).slice(0,20);
    H+=`<div class="lb-row lb-head"><span>#</span><span>Name</span><span>Subject</span><span>Score</span><span>%</span><span>Date</span></div>`;
    top.forEach((r,i)=>{
      const clr=rClr(r.percentage);
      const medal=i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':'';
      H+=`<div class="lb-row">
        <div class="lb-rank ${medal}">${medal?['🥇','🥈','🥉'][i]:i+1}</div>
        <div class="lb-name">${escH(r.name)}</div>
        <div class="lb-subj">${escH(r.subject.toUpperCase())}</div>
        <div class="lb-score">${r.score}/${r.maxScore}</div>
        <div class="lb-pct" style="color:${clr}">${r.percentage.toFixed(1)}%</div>
        <div class="lb-date">${fdShort(r.date)}</div>
      </div>`;
    });
  } else {
    // Students view — aggregate by name
    const byStudent={};
    rows.forEach(r=>{
      if(!byStudent[r.name])byStudent[r.name]={name:r.name,count:0,totalPct:0,best:0,subjects:new Set()};
      byStudent[r.name].count++;
      byStudent[r.name].totalPct+=r.percentage;
      byStudent[r.name].best=Math.max(byStudent[r.name].best,r.percentage);
      byStudent[r.name].subjects.add(r.subject);
    });
    const students=Object.values(byStudent).sort((a,b)=>(b.totalPct/b.count)-(a.totalPct/a.count));
    H+=`<div class="lb-row lb-head" style="grid-template-columns:32px 1fr 60px 70px 70px 60px">
      <span>#</span><span>Student</span><span>Tests</span><span>Subjects</span><span>Avg %</span><span>Best</span>
    </div>`;
    students.forEach((s,i)=>{
      const avg=(s.totalPct/s.count);
      const clr=rClr(avg);
      const medal=i===0?'medal-1':i===1?'medal-2':i===2?'medal-3':'';
      H+=`<div class="lb-row" style="grid-template-columns:32px 1fr 60px 70px 70px 60px">
        <div class="lb-rank ${medal}">${medal?['🥇','🥈','🥉'][i]:i+1}</div>
        <div class="lb-name">${escH(s.name)}</div>
        <div class="lb-score" style="text-align:left">${s.count}</div>
        <div class="lb-subj" style="font-size:9px">${[...s.subjects].map(x=>x.toUpperCase()).join(', ')}</div>
        <div class="lb-pct" style="color:${clr}">${avg.toFixed(1)}%</div>
        <div class="lb-pct" style="color:${rClr(s.best)}">${s.best.toFixed(1)}%</div>
      </div>`;
    });
  }

  container.innerHTML=H;
}

function switchLbTab(tab){
  const container=document.querySelector('#lb-main .lb-body');
  if(container)renderLbView(container,tab);

function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fdShort(iso){try{return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short'});}catch(e){return'—';}}

/* ══════════════════════════════════════════
   HEATMAP
══════════════════════════════════════════ */
function buildHeatmapHTML(allAtt){
  const dateMap={};
  allAtt.forEach(d=>{
    if(!d.date)return;
    const key=d.date.substring(0,10);
    dateMap[key]=(dateMap[key]||0)+1;
  });
  const today=new Date();
  const start=new Date(today);
  start.setMonth(start.getMonth()-5);start.setDate(1);
  while(start.getDay()!==0)start.setDate(start.getDate()-1);
  const weeks=[];const cur=new Date(start);
  while(cur<=today){
    const week=[];
    for(let d=0;d<7;d++){
      const ds=cur.toISOString().substring(0,10);
      const cnt=dateMap[ds]||0;
      const lvl=cnt===0?0:cnt===1?1:cnt===2?2:cnt===3?3:4;
      const inRange=cur<=today&&cur>=new Date(today.getFullYear(),today.getMonth()-5,1);
      week.push({date:ds,count:cnt,level:inRange?lvl:0});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(week);
  }
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let monthLabels='<div class="hm-months" style="gap:0;">';
  let lastMonth=-1;
  weeks.forEach(wk=>{
    const m=new Date(wk[0].date).getMonth();
    if(m!==lastMonth){monthLabels+=`<div class="hm-month-lbl" style="min-width:${13*1+3}px;">${months[m]}</div>`;lastMonth=m;}
    else monthLabels+=`<div style="min-width:16px;"></div>`;
  });
  monthLabels+='</div>';
  let grid='<div style="display:flex;gap:4px;align-items:flex-start;">';
  grid+=`<div class="hm-days-lbl"><div class="hm-dl"></div><div class="hm-dl">M</div><div class="hm-dl"></div><div class="hm-dl">W</div><div class="hm-dl"></div><div class="hm-dl">F</div><div class="hm-dl"></div></div>`;
  grid+='<div class="heatmap-grid">';
  weeks.forEach(wk=>{
    grid+='<div class="hm-week">';
    wk.forEach(day=>{
      grid+=`<div class="hm-day l${day.level}" onmouseenter="showHmTip(event,'${day.date}',${day.count})" onmouseleave="hideHmTip()"></div>`;
    });
    grid+='</div>';
  });
  grid+='</div></div>';
  return monthLabels+'<div class="heatmap-wrap">'+grid+'</div>';
}
function showHmTip(e,date,count){
  const tip=document.getElementById('hm-tip');
  tip.innerHTML=`<b>${count} test${count!==1?'s':''}</b> on ${fd(date)}`;
  tip.style.display='block';
  tip.style.left=(e.clientX+12)+'px';
  tip.style.top=(e.clientY-30)+'px';
}
function hideHmTip(){document.getElementById('hm-tip').style.display='none';}

function buildPredictedHTML(sv){
  const CUET_MAX_PER_SUBJ=200;

  let H='<div class="predict-grid a">';
  sv.forEach(sId=>{
    const subj=SUBJECTS_MASTER.find(s=>s.id===sId);if(!subj)return;
    const att=[];subj.chapters.forEach(ch=>{const r=lR(sId,ch.id);if(r)att.push(r);});
    const avgPct=att.length>0?att.reduce((s,d)=>s+d.percentage,0)/att.length:null;
    const predScore=avgPct!==null?Math.round(avgPct/100*CUET_MAX_PER_SUBJ):null;
    totalMax+=CUET_MAX_PER_SUBJ;
    if(predScore!==null)totalPred+=predScore;
    const clr=avgPct!==null?rClr(avgPct):'var(--muted)';

  H+='</div>';

  H=`<div class="predict-total a">

      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:4px;">Predicted Total CUET Score</div>

══════════════════════════════════════════ */
function buildTargetSetterHTML(sv){
  let opts=sv.map(sId=>{const s=SUBJECTS_MASTER.find(x=>x.id===sId);return s?`<option value="${sId}">${s.icon} ${s.name}</option>`:''}).join('');
  return`<div class="target-card a">
    <div class="target-row"><div class="target-label">Subject</div>
      <select class="filter-sel" id="tgt-subj" onchange="calcTarget()">${opts}</select>
    </div>
    <div class="target-row"><div class="target-label">I want to score</div>
      <input type="range" class="target-slider" id="tgt-pct" min="30" max="100" value="80" oninput="document.getElementById('tgt-pct-val').textContent=this.value+'%';calcTarget()">
      <div class="target-val" id="tgt-pct-val">80%</div>
    </div>
    <div class="target-result" id="tgt-result">Select a subject above.</div>
  </div>`;

function calcTarget(){
  const sId=document.getElementById('tgt-subj')?.value;
  const tgt=parseInt(document.getElementById('tgt-pct')?.value||80);
  const subj=SUBJECTS_MASTER.find(s=>s.id===sId);if(!subj)return;
  const att=[];subj.chapters.forEach(ch=>{const r=lR(sId,ch.id);if(r)att.push({...r,ci:ch});});
  const notAtt=subj.chapters.filter(ch=>!lR(sId,ch.id));
  const curAvg=att.length>0?att.reduce((s,d)=>s+d.percentage,0)/att.length:0;
  const done=att.length,total=subj.chapters.length;
  const needed=Math.max(0,Math.ceil((tgt*total-curAvg*done)/(total-done||1)));
  const feasible=needed<=100;
  const res=document.getElementById('tgt-result');if(!res)return;
  if(done===0){res.innerHTML=`You haven't attempted any ${subj.name} chapters yet. Complete at least one chapter to get a personalised plan.`;return;}
  if(done>=total){const actualAvg=att.reduce((s,d)=>s+d.percentage,0)/att.length;
    res.innerHTML=`You've completed all ${total} chapters with <strong>${actualAvg.toFixed(1)}% average</strong>. ${actualAvg>=tgt?'✅ Goal achieved! Consider retaking weak chapters.':'Consider retaking your weakest chapters to improve.'}`;return;}
  res.innerHTML=`Current avg: <strong>${curAvg.toFixed(1)}%</strong> across ${done}/${total} chapters.<br>
  To reach <strong>${tgt}%</strong> overall, you need to average <strong style="color:${feasible?'var(--green)':'var(--red)'}">${Math.min(needed,100)}%${needed>100?' (very tough!)':''}</strong> in the remaining <strong>${total-done} chapters</strong>.<br>
  ${notAtt.length>0?`Next up: <strong>${notAtt[0].name}</strong>`:''}
  ${!feasible?'<br>⚠️ Consider retaking earlier chapters to boost your average.':''}`;
}

/* ══════════════════════════════════════════
   FILTER CHAPTERS
══════════════════════════════════════════ */
function applyFilter(sId){
  const wrap=document.getElementById(`stab-${sId}`);if(!wrap||!wrap._att)return;
  const search=(document.getElementById(`filt-search-${sId}`)?.value||'').toLowerCase();
  const type=document.getElementById(`filt-type-${sId}`)?.value||'';
  const grade=document.getElementById(`filt-grade-${sId}`)?.value||'';
  const sort=document.getElementById(`filt-sort-${sId}`)?.value||'date';
  let filtered=[...wrap._att];
  if(search)filtered=filtered.filter(d=>(d.ci?.name||d.chapterId).toLowerCase().includes(search));
  if(type)filtered=filtered.filter(d=>(d.ci?.type||'')===(type));
  if(grade)filtered=filtered.filter(d=>{
    const p=d.percentage||0;
    if(grade==='A')return p>=75;if(grade==='B')return p>=50&&p<75;
    if(grade==='C')return p>=35&&p<50;if(grade==='D')return p<35;return true;
  });
  if(sort==='score_desc')filtered.sort((a,b)=>b.percentage-a.percentage);
  else if(sort==='score_asc')filtered.sort((a,b)=>a.percentage-b.percentage);
  else if(sort==='name')filtered.sort((a,b)=>(a.ci?.name||a.chapterId).localeCompare(b.ci?.name||b.chapterId));
  else filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
  const grid=document.getElementById(`cards-grid-${sId}`);if(!grid)return;
  if(!filtered.length){grid.innerHTML=`<div style="color:var(--muted);padding:20px;font-size:13px;">No chapters match your filters.</div>`;return;}
  grid.innerHTML=filtered.map(d=>buildChapterCard(d,sId)).join('');
}

function buildChapterCard(d,sId){

  const ttype=d.ci?.type||'chapwise';
  let impH='';
  if(diff!==null){
    if(diff>0)impH=`<div class="imp iup">▲ +${diff}% improved</div>`;
    else if(diff<0)impH=`<div class="imp idn">▼ ${diff}% dropped</div>`;

      <div class="hr2">

      </div>`).join('')}

  return`<div class="chc">
    <div class="acc2 ${gi.acc}"></div>
    <div class="cb2">
      <div class="ct2">
        <div><div class="cn">${d.ci?.name||d.chapterId}</div><div class="ci">${d.chapterId.toUpperCase()}</div></div>
        <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
          <span class="gb ${gi.cls}">${gi.g} Grade</span>
          <span class="tb" style="background:${TC[ttype]};color:${TX[ttype]};border-color:${TX[ttype]}33">${TL[ttype]||ttype}</span>
        </div>
      </div>
      <div class="sr">
        <div class="rw">
          <svg viewBox="0 0 60 60"><circle class="rb" cx="30" cy="30" r="25"/>
          <circle class="rf" cx="30" cy="30" r="25" stroke="${clr}"
            stroke-dasharray="${circ.toFixed(2)}" stroke-dashoffset="${dash.toFixed(2)}"/></svg>
          <div class="rp" style="color:${clr}">${Math.round(p)}%</div>
        </div>
        <div><div class="sb" style="color:${clr}">${d.score}<span style="font-size:13px;color:var(--muted)">/${d.maxScore}</span></div>
        <div class="ss">Acc: ${d.accuracy||0}% · ${ft(d.timeTaken)}</div></div>
      </div>
      <div class="ms">
        <div><div class="ml">Correct</div><div class="mv cg">${d.correct}</div></div>

        <div><div class="ml">Skipped</div><div class="mv cc">${d.unanswered}</div></div>
        <div><div class="ml">Total</div><div class="mv cm">${d.totalQ||50}</div></div>
      </div>
      ${impH}${histH}
    </div>
    <div class="cf"><span>📅 ${fd(d.date)}</span>
      <a class="cfb" href="${buildUrl(sId,d.chapterId)}" target="_blank">↻ Retake</a>
    </div>
  </div>`;
}

  const timeCv=document.getElementById(`ch-time-${sId}`);
  if(timeCv&&wtm.length){
    const ws=[...wtm].sort((a,b)=>a.chapterId.localeCompare(b.chapterId));
    CI[`tm-${sId}`]=new Chart(timeCv.getContext('2d'),{type:'bar',data:{
      labels:ws.map(d=>(d.ci?.name||d.chapterId).substring(0,6)),
      datasets:[{data:ws.map(d=>Math.round(d.timeTaken/60)),
        backgroundColor:'rgba(0,212,255,.25)',borderColor:'rgba(0,212,255,.7)',borderWidth:1,borderRadius:3}]
    },options:chartOpts(false,v=>v+'m')});
  }
  const donutCv=document.getElementById(`ch-donut-${sId}`);
  if(donutCv){
    CI[`d-${sId}`]=new Chart(donutCv.getContext('2d'),{type:'doughnut',data:{
      datasets:[{data:[att.length,subj.chapters.length-att.length],
        backgroundColor:['rgba(0,212,255,.8)','rgba(255,255,255,.05)'],
        borderColor:['rgba(0,212,255,1)','transparent'],borderWidth:[2,0],hoverOffset:3}]
    },options:{responsive:true,maintainAspectRatio:true,cutout:'72%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataIndex===0?`Done: ${att.length}`:`Left: ${subj.chapters.length-att.length}`}}}}});
  }
}
function chartOpts(yMax100,yFmt){
  return{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y}${yMax100?'%':' min'}`}}},
    scales:{
      x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b6b90',font:{size:9,family:'JetBrains Mono'},maxRotation:45,maxTicksLimit:8}},
      y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#6b6b90',font:{size:9,family:'JetBrains Mono'},callback:yFmt},min:0,...(yMax100?{max:100}:{})}
    }};
}

function openProfileModal(){
  const p=getProfile();const sv=getSS();
  document.getElementById('pf-name').value=p.name||localStorage.getItem('cbtUserName')||'';
  document.getElementById('pf-class').value=p.class||'';

  sv.forEach(sId=>{

function saveProfile(){
  const sv=getSS();const goals={};
  sv.forEach(sId=>{const el=document.getElementById(`goal-${sId}`);if(el)goals[sId]=parseInt(el.value);});
  const p={
    name:document.getElementById('pf-name').value.trim(),
    class:document.getElementById('pf-class').value.trim(),
    college:document.getElementById('pf-college').value.trim(),
    avatar:document.getElementById('pf-avatar').value.trim(),goals
  };
  saveProfile_raw(p);if(p.name)localStorage.setItem('cbtUserName',p.name);
  cm('prof-modal');renderHome();showTab('home');
}

function testGsConnection(){
  document.getElementById('gs-status').innerHTML=`<span style="color:var(--yellow)">⏳ Testing…</span>`;
  fetch(GS_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:'TEST',subject:'test',chapter:'test',score:0,maxScore:100,percentage:0,correct:0,wrong:0,skipped:0,timeTaken:0,accuracy:0,date:new Date().toISOString()})
  }).then(r=>r.json()).then(d=>{
    document.getElementById('gs-status').innerHTML=d.status==='ok'
      ?`<span style="color:var(--green)">✅ Connection successful! Check your Sheet for a TEST row.</span>`
      :`<span style="color:var(--red)">❌ Error: ${d.msg}</span>`;
  }).catch(e=>{
    document.getElementById('gs-status').innerHTML=`<span style="color:var(--red)">❌ Failed: ${e.message}</span>`;

function rmSubj(id){
  if(!confirm(`Remove ${id.toUpperCase()} from dashboard?`))return;
  let sv=getSS().filter(x=>x!==id);saveSS(sv);
  buildNavTabs();renderHome();showTab('home');renderSettings();
}
function clearSubjData(sId){
  const subj=SUBJECTS_MASTER.find(s=>s.id===sId);if(!subj)return;
  if(!confirm(`Delete ALL ${subj.name} results?`))return;
  subj.chapters.forEach(ch=>{localStorage.removeItem(rKey(sId,ch.id));localStorage.removeItem(hKey(sId,ch.id));});
  localStorage.removeItem(`thunderstudy_index_${sId}`);
  renderHome();showTab('home');
}
function clearAllData(){
  if(!confirm('⚠️ Delete ALL results from ALL subjects? This cannot be undone!'))return;
  SUBJECTS_MASTER.forEach(subj=>subj.chapters.forEach(ch=>{
    localStorage.removeItem(rKey(subj.id,ch.id));localStorage.removeItem(hKey(subj.id,ch.id));
  }));
  renderHome();showTab('home');
}

function sendToGoogleSheet(data){
  if(!GS_URL)return;
  fetch(GS_URL,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      name:data.userName||'Unknown',subject:data.subjectId||'',chapter:data.chapterId||'',
      score:data.score,maxScore:data.maxScore,percentage:data.percentage,correct:data.correct,
      wrong:data.incorrect,skipped:data.unanswered,timeTaken:data.timeTaken,accuracy:data.accuracy,date:data.date
    })
  }).catch(()=>{});
}
