<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thunderstudy — Results</title>

<script>
/* ============================================================
   ✏️  EDIT ONLY THIS ONE LINE FOR EACH SUBJECT
   ============================================================ */
const SUBJECT_ID = "bst";   // must match what you put in the CBT files
/* ============================================================ */

// Human-readable chapter names (optional — fill in as many as you have)
// key = CHAPTER_ID used in CBT file, value = display name
const CHAPTER_NAMES = {
  bst1:  "Chapter 1 – Nature & Significance",
  bst2:  "Chapter 2 – Principles of Management",
  bst3:  "Chapter 3 – Business Environment",
  bst4:  "Chapter 4 – Planning",
  bst5:  "Chapter 5 – Organising",
  bst6:  "Chapter 6 – Staffing",
  bst7:  "Chapter 7 – Directing",
  bst8:  "Chapter 8 – Controlling",
  bst9:  "Chapter 9 – Financial Management",
  bst10: "Chapter 10 – Financial Markets",
  bst11: "Chapter 11 – Marketing Management",
  bst12: "Chapter 12 – Consumer Protection",
};
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0d0d14;
  --surface: #13131f;
  --surface2: #1a1a2e;
  --surface3: #20203a;
  --border: rgba(255,255,255,0.08);
  --accent: #7c5cbf;
  --accent2: #4fa3e0;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #e8e8f0;
  --muted: #7b7b9a;
  --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Sora', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background ── */
body::before {
  content: '';
  position: fixed;
  top: -20%;
  left: -10%;
  width: 50vw;
  height: 50vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,92,191,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%;
  right: -10%;
  width: 40vw;
  height: 40vw;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(79,163,224,0.1) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }

/* ── Header ── */
.header {
  padding: 40px 0 30px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 36px;
}

.header-left h1 {
  font-size: clamp(24px, 4vw, 36px);
  font-weight: 800;
  background: linear-gradient(135deg, #bb86fc, #4fa3e0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
}

.header-left p {
  color: var(--muted);
  font-size: 14px;
  margin-top: 6px;
}

.subject-badge {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: white;
  padding: 6px 18px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── Summary bar ── */
.summary-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px;
  margin-bottom: 36px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: transform 0.2s, border-color 0.2s;
}

.summary-card:hover { transform: translateY(-3px); border-color: rgba(124,92,191,0.4); }

.summary-card .label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
}

.summary-card .value {
  font-size: 26px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
}

.val-purple { color: #bb86fc; }
.val-green  { color: var(--green); }
.val-red    { color: var(--red); }
.val-blue   { color: var(--accent2); }
.val-yellow { color: var(--yellow); }

/* ── Section title ── */
.section-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Chapter cards ── */
.chapters-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 18px;
  margin-bottom: 44px;
}

.chapter-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  cursor: default;
}

.chapter-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--card-shadow);
  border-color: rgba(124,92,191,0.35);
}

.chapter-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 16px 16px 0 0;
}
.card-excellent::before { background: linear-gradient(90deg, #22c55e, #4ade80); }
.card-good::before      { background: linear-gradient(90deg, #4fa3e0, #7dd3fc); }
.card-average::before   { background: linear-gradient(90deg, #f59e0b, #fcd34d); }
.card-poor::before      { background: linear-gradient(90deg, #ef4444, #f87171); }

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
}

.card-chapter-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.4;
  max-width: 200px;
}

.card-chapter-id {
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  margin-top: 3px;
}

.grade-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.grade-A { background: rgba(34,197,94,0.15); color: #4ade80; }
.grade-B { background: rgba(79,163,224,0.15); color: #7dd3fc; }
.grade-C { background: rgba(245,158,11,0.15); color: #fcd34d; }
.grade-D { background: rgba(239,68,68,0.15); color: #f87171; }

/* Score ring */
.score-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 14px;
}

.ring-wrap {
  position: relative;
  width: 58px;
  height: 58px;
  flex-shrink: 0;
}

.ring-wrap svg {
  transform: rotate(-90deg);
  width: 58px;
  height: 58px;
}

.ring-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 5; }
.ring-fg { fill: none; stroke-width: 5; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }

.ring-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}

.score-details { flex: 1; }
.score-main {
  font-size: 22px;
  font-weight: 800;
  font-family: 'JetBrains Mono', monospace;
}
.score-sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

/* Stats row */
.stats-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.mini-stat {
  flex: 1;
  min-width: 60px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 7px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.mini-stat .ms-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.mini-stat .ms-value { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

.ms-green { color: var(--green); }
.ms-red   { color: var(--red); }
.ms-blue  { color: var(--accent2); }

.card-footer {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--muted);
}

/* ── Not attempted ── */
.not-attempted-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 44px;
}

.na-card {
  background: var(--surface);
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  transition: border-color 0.2s, background 0.2s;
  text-decoration: none;
}

.na-card:hover {
  background: var(--surface2);
  border-color: rgba(124,92,191,0.4);
}

.na-icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--surface3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}

.na-info .na-name { font-size: 13px; font-weight: 600; color: var(--text); }
.na-info .na-id { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--muted); margin-top: 2px; }

/* ── Progress bar ── */
.prog-bar-wrap { margin-bottom: 44px; }
.prog-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.prog-name { font-size: 13px; font-weight: 500; width: 220px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.prog-track { flex: 1; height: 8px; background: var(--surface3); border-radius: 8px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 8px; transition: width 1.2s cubic-bezier(.34,1.56,.64,1); }
.prog-pct { font-size: 12px; font-weight: 700; font-family: 'JetBrains Mono', monospace; width: 42px; text-align: right; flex-shrink: 0; }

/* ── No results ── */
.empty-state {
  text-align: center;
  padding: 80px 20px;
}
.empty-icon { font-size: 64px; margin-bottom: 20px; }
.empty-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.empty-sub { font-size: 15px; color: var(--muted); line-height: 1.7; }

/* ── Buttons ── */
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 32px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:active { transform: scale(0.96); }

.btn-primary { background: linear-gradient(135deg, #7c5cbf, #4fa3e0); color: white; box-shadow: 0 4px 14px rgba(124,92,191,0.4); }
.btn-danger  { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; box-shadow: 0 4px 14px rgba(239,68,68,0.35); }
.btn-tele    { background: linear-gradient(135deg, #0088cc, #006699); color: white; box-shadow: 0 4px 14px rgba(0,136,204,0.35); }
.btn-outline { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-outline:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

/* ── Footer ── */
footer {
  text-align: center;
  padding: 30px 20px;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 13px;
  position: relative;
  z-index: 1;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
.animate { animation: fadeUp 0.5s ease both; }

@media (max-width: 600px) {
  .header { flex-direction: column; align-items: flex-start; }
  .prog-name { width: 130px; }
}
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <div class="header animate">
    <div class="header-left">
      <h1>⚡ Thunderstudy Results</h1>
      <p id="header-sub">Loading your results…</p>
    </div>
    <div class="subject-badge" id="subject-display">—</div>
  </div>

  <!-- Controls -->
  <div class="btn-row animate" style="animation-delay:0.05s">
    <button class="btn btn-primary" onclick="loadResults()">🔄 Refresh</button>
    <a href="https://t.me/thunderstudy_official" target="_blank" class="btn btn-tele">⚡ Join Telegram</a>
    <button class="btn btn-danger" onclick="clearData()">🗑️ Clear All Data</button>
  </div>

  <!-- Content injected by JS -->
  <div id="content"></div>

</div>

<footer>© 2025 Thunderstudy &nbsp;|&nbsp; t.me/thunderstudy_official</footer>

<script>
/* ── All chapters in this subject (edit list as needed) ── */
const ALL_CHAPTERS = [
  "bst1","bst2","bst3","bst4","bst5","bst6",
  "bst7","bst8","bst9","bst10","bst11","bst12"
];

function chapterName(id) {
  return CHAPTER_NAMES[id] || id.toUpperCase();
}

function gradeInfo(pct) {
  if (pct >= 75) return { grade:'A', label:'Excellent', cls:'card-excellent grade-A' };
  if (pct >= 50) return { grade:'B', label:'Good',      cls:'card-good grade-B' };
  if (pct >= 35) return { grade:'C', label:'Average',   cls:'card-average grade-C' };
  return           { grade:'D', label:'Needs Work',  cls:'card-poor grade-D' };
}

function ringColor(pct) {
  if (pct >= 75) return '#22c55e';
  if (pct >= 50) return '#4fa3e0';
  if (pct >= 35) return '#f59e0b';
  return '#ef4444';
}

function fmtDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
  } catch(e) { return '—'; }
}

function fmtTime(secs) {
  if (!secs) return '—';
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${m}m ${s}s`;
}

function loadResults() {
  document.getElementById('subject-display').textContent = SUBJECT_ID.toUpperCase();

  // Load all attempted chapters
  const attempted = [];
  ALL_CHAPTERS.forEach(chId => {
    const key = `thunderstudy_result_${SUBJECT_ID}_${chId}`;
    const raw = localStorage.getItem(key);
    if (raw) {
      try {
        const d = JSON.parse(raw);
        attempted.push(d);
      } catch(e) {}
    }
  });

  const notAttempted = ALL_CHAPTERS.filter(
    chId => !attempted.find(a => a.chapterId === chId)
  );

  const content = document.getElementById('content');

  if (attempted.length === 0) {
    document.getElementById('header-sub').textContent = 'No tests attempted yet on this device.';
    content.innerHTML = `
      <div class="empty-state animate">
        <div class="empty-icon">📭</div>
        <div class="empty-title">No Results Found</div>
        <div class="empty-sub">
          You haven't attempted any <strong>${SUBJECT_ID.toUpperCase()}</strong> chapter tests yet on this device.<br>
          Complete a mock test and your results will appear here automatically.
        </div>
      </div>`;
    return;
  }

  // Aggregate stats
  const totalChapters   = attempted.length;
  const totalScore      = attempted.reduce((s,d) => s + d.score, 0);
  const totalMax        = attempted.reduce((s,d) => s + d.maxScore, 0);
  const totalCorrect    = attempted.reduce((s,d) => s + d.correct, 0);
  const totalIncorrect  = attempted.reduce((s,d) => s + d.incorrect, 0);
  const totalUnanswered = attempted.reduce((s,d) => s + d.unanswered, 0);
  const overallPct      = totalMax > 0 ? ((totalScore / totalMax) * 100).toFixed(1) : 0;
  const userName        = attempted[0].userName || 'Unknown';

  document.getElementById('header-sub').textContent =
    `${userName} · ${totalChapters} of ${ALL_CHAPTERS.length} chapters attempted`;

  // Sort by chapter id
  attempted.sort((a,b) => a.chapterId.localeCompare(b.chapterId));

  let html = '';

  /* ── Summary bar ── */
  html += `
  <div class="summary-bar animate" style="animation-delay:0.1s">
    <div class="summary-card"><div class="label">Chapters Done</div><div class="value val-purple">${totalChapters}/${ALL_CHAPTERS.length}</div></div>
    <div class="summary-card"><div class="label">Overall %</div><div class="value val-blue">${overallPct}%</div></div>
    <div class="summary-card"><div class="label">Total Score</div><div class="value val-yellow">${totalScore}/${totalMax}</div></div>
    <div class="summary-card"><div class="label">Total Correct</div><div class="value val-green">${totalCorrect}</div></div>
    <div class="summary-card"><div class="label">Total Wrong</div><div class="value val-red">${totalIncorrect}</div></div>
    <div class="summary-card"><div class="label">Skipped</div><div class="value" style="color:var(--muted)">${totalUnanswered}</div></div>
  </div>`;

  /* ── Progress comparison ── */
  html += `<div class="section-title animate" style="animation-delay:0.15s">📊 Chapter Progress</div>`;
  html += `<div class="prog-bar-wrap animate" style="animation-delay:0.15s">`;
  attempted.forEach(d => {
    const pct   = d.percentage || 0;
    const color = ringColor(pct);
    html += `
    <div class="prog-row">
      <div class="prog-name" title="${chapterName(d.chapterId)}">${chapterName(d.chapterId)}</div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color};" data-width="${pct}%"></div></div>
      <div class="prog-pct" style="color:${color}">${pct}%</div>
    </div>`;
  });
  html += `</div>`;

  /* ── Chapter cards ── */
  html += `<div class="section-title animate" style="animation-delay:0.2s">🗂️ Attempted Chapters</div>`;
  html += `<div class="chapters-grid">`;

  attempted.forEach((d, i) => {
    const pct   = d.percentage || 0;
    const gi    = gradeInfo(pct);
    const circ  = 2 * Math.PI * 24; // r=24
    const dash  = circ - (pct / 100) * circ;
    const color = ringColor(pct);
    const acc   = d.accuracy || 0;

    html += `
    <div class="chapter-card ${gi.cls.split(' ')[0]} animate" style="animation-delay:${0.22 + i*0.05}s">
      <div class="card-top">
        <div>
          <div class="card-chapter-name">${chapterName(d.chapterId)}</div>
          <div class="card-chapter-id">${d.chapterId.toUpperCase()}</div>
        </div>
        <span class="grade-badge ${gi.cls.split(' ')[1]}">${gi.grade} · ${gi.label}</span>
      </div>

      <div class="score-row">
        <div class="ring-wrap">
          <svg viewBox="0 0 58 58">
            <circle class="ring-bg" cx="29" cy="29" r="24"/>
            <circle class="ring-fg" cx="29" cy="29" r="24"
              stroke="${color}"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${dash}"/>
          </svg>
          <div class="ring-text" style="color:${color}">${Math.round(pct)}%</div>
        </div>
        <div class="score-details">
          <div class="score-main" style="color:${color}">${d.score}<span style="font-size:14px;color:var(--muted)">/${d.maxScore}</span></div>
          <div class="score-sub">Accuracy: ${acc}% &nbsp;|&nbsp; ${fmtTime(d.timeTaken)}</div>
        </div>
      </div>

      <div class="stats-row">
        <div class="mini-stat"><div class="ms-label">Correct</div><div class="ms-value ms-green">${d.correct}</div></div>
        <div class="mini-stat"><div class="ms-label">Wrong</div><div class="ms-value ms-red">${d.incorrect}</div></div>
        <div class="mini-stat"><div class="ms-label">Skipped</div><div class="ms-value ms-blue">${d.unanswered}</div></div>
        <div class="mini-stat"><div class="ms-label">Total Q</div><div class="ms-value" style="color:var(--muted)">${d.totalQ}</div></div>
      </div>

      <div class="card-footer">
        <span>👤 ${d.userName || '—'}</span>
        <span>📅 ${fmtDate(d.date)}</span>
      </div>
    </div>`;
  });
  html += `</div>`;

  /* ── Not attempted ── */
  if (notAttempted.length > 0) {
    html += `<div class="section-title animate">📋 Not Yet Attempted (${notAttempted.length})</div>`;
    html += `<div class="not-attempted-grid animate">`;
    notAttempted.forEach(chId => {
      const url = `https://commercesehoga.github.io/commerce/bst/${chId}.html`;
      html += `
      <a class="na-card" href="${url}" target="_blank">
        <div class="na-icon">📝</div>
        <div class="na-info">
          <div class="na-name">${chapterName(chId)}</div>
          <div class="na-id">${chId.toUpperCase()} · Click to attempt</div>
        </div>
      </a>`;
    });
    html += `</div>`;
  }

  content.innerHTML = html;
}

function clearData() {
  if (!confirm(`⚠️ This will permanently delete ALL ${SUBJECT_ID.toUpperCase()} test results from this device.\n\nAre you sure?`)) return;
  ALL_CHAPTERS.forEach(chId => {
    localStorage.removeItem(`thunderstudy_result_${SUBJECT_ID}_${chId}`);
  });
  localStorage.removeItem(`thunderstudy_index_${SUBJECT_ID}`);
  loadResults();
}

// Auto-load on page open
window.addEventListener('load', loadResults);
</script>

</body>
</html>
